<!doctype html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CacheLikesFromTwitter Settings</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script defer src="{{ url_for('static', filename='numeric-input-format.js') }}"></script>
</head>
<body>
{% set current_phase = snapshot.phase or "idle" %}
<main class="page">
    <div class="app-shell is-sidebar-open" id="app_shell">
        <button
            type="button"
            class="sidebar-toggle"
            id="sidebar_toggle"
            aria-label="Toggle sidebar"
            aria-expanded="true"
        >
            <span class="icon sidebar-toggle-icon" aria-hidden="true"></span>
        </button>

        <button
            type="button"
            class="sidebar-backdrop"
            id="sidebar_backdrop"
            aria-label="Close sidebar"
            aria-hidden="true"
            tabindex="-1"
            hidden
        ></button>

        <aside class="panel sidebar" id="settings_sidebar">
            <section class="sidebar-section anchor-section" id="settings">
                <div class="section-heading">
                    <div>
                        <p class="section-kicker">Control plane</p>
                        <h2>Settings</h2>
                    </div>
                    <span class="status-chip status-{{ current_phase }}">{{ current_phase }}</span>
                </div>
            </section>
        </aside>

        <section class="panel chart-panel workspace" id="settings_workspace">
            <div class="workspace-header">
                <div class="report-card workspace-summary-card workspace-article-card">
                    <div class="report-heading-row">
                        <div>
                            <p class="workspace-kicker">Settings</p>
                            <h2>Configuration center</h2>
                        </div>
                    </div>
                    <p class="status-copy">
                        Save your crawler configuration here. Then return to the download page and start caching with one click.
                    </p>
                    <form action="{{ url_for('save_settings') }}" method="post" class="sidebar-form" id="settings_form">
                        <label class="field">
                            <span>Chrome user data dir</span>
                            <input type="text" name="chrome_user_data_dir" value="{{ saved_config.chrome_user_data_dir }}">
                        </label>
                        <label class="field">
                            <span>Chrome profile directory</span>
                            <input type="text" name="chrome_profile_directory" value="{{ saved_config.chrome_profile_directory }}">
                        </label>
                        <label class="field">
                            <span>Account name override</span>
                            <input type="text" name="account_name_override" value="{{ saved_config.account_name_override }}" placeholder="Optional folder name override">
                        </label>
                        <div class="field-grid compact-config-grid">
                            <label class="field compact-config-field">
                                <span>Download workers</span>
                                <input type="text" inputmode="numeric" class="formatted-number-input" data-number-format="integer" name="download_workers" value="{{ saved_config.download_workers }}">
                            </label>
                            <label class="field compact-config-field">
                                <span>Max media files</span>
                                <input type="text" inputmode="numeric" class="formatted-number-input" data-number-format="integer" name="max_media_items" value="{{ saved_config.max_media_items }}">
                            </label>
                            <label class="field compact-config-field">
                                <span>Max scroll rounds</span>
                                <input type="text" inputmode="numeric" class="formatted-number-input" data-number-format="integer" name="max_scroll_rounds" value="{{ saved_config.max_scroll_rounds }}">
                            </label>
                            <label class="field compact-config-field">
                                <span>Scroll pause seconds</span>
                                <input type="text" inputmode="decimal" class="formatted-number-input" data-number-format="decimal" name="scroll_pause_seconds" value="{{ saved_config.scroll_pause_seconds }}">
                            </label>
                        </div>
                        <label class="field compact-config-field">
                            <span>Stale round limit</span>
                            <input type="text" inputmode="numeric" class="formatted-number-input" data-number-format="integer" name="stale_round_limit" value="{{ saved_config.stale_round_limit }}">
                        </label>
                        <label class="field field-switch">
                            <span>Browser mode</span>
                            <span class="switch-row">
                                <span class="switch-label">Run browser in headless mode</span>
                                <span class="ios-switch-shell">
                                    <input type="checkbox" name="headless" {% if saved_config.headless %}checked{% endif %}>
                                    <span class="ios-switch-slider" aria-hidden="true"></span>
                                </span>
                            </span>
                        </label>
                        <button type="submit" class="primary-button sidebar-action-button">Save settings</button>
                    </form>
                </div>
            </div>
        </section>
    </div>

    <nav class="sidebar-dock" aria-label="Workspace sections">
        <a href="{{ url_for('index') }}" class="sidebar-dock-item" data-section-link="x" aria-label="X">
            <span class="icon dock-icon dock-icon-x" aria-hidden="true"></span>
        </a>
        <a href="{{ url_for('grok') }}" class="sidebar-dock-item" data-section-link="grok" aria-label="Grok">
            <span class="icon dock-icon dock-icon-grok" aria-hidden="true"></span>
        </a>
        <a href="{{ url_for('settings') }}" class="sidebar-dock-item is-active" data-section-link="settings" aria-label="Settings">
            <span class="icon dock-icon dock-icon-settings" aria-hidden="true"></span>
        </a>
    </nav>
</main>

<script>
    const appShell = document.getElementById("app_shell");
    const sidebarToggle = document.getElementById("sidebar_toggle");
    const sidebarBackdrop = document.getElementById("sidebar_backdrop");
    const shellMobileQuery = window.matchMedia("(max-width: 900px)");
    const sidebarMotionDurationMs = window.matchMedia("(prefers-reduced-motion: reduce)").matches ? 1 : 500;
    let sidebarMotionResetTimer = 0;

    function setSidebarMotionState(direction) {
        if (sidebarMotionResetTimer) {
            window.clearTimeout(sidebarMotionResetTimer);
            sidebarMotionResetTimer = 0;
        }

        appShell.classList.remove("is-sidebar-animating", "is-sidebar-opening", "is-sidebar-closing");
        void appShell.offsetWidth;

        if (!direction) {
            return;
        }

        appShell.classList.add("is-sidebar-animating", direction === "opening" ? "is-sidebar-opening" : "is-sidebar-closing");
        sidebarMotionResetTimer = window.setTimeout(() => {
            appShell.classList.remove("is-sidebar-animating", "is-sidebar-opening", "is-sidebar-closing");
            sidebarMotionResetTimer = 0;
        }, sidebarMotionDurationMs);
    }

    function setSidebarOpen(isOpen, options = {}) {
        const { persist = true, animate = false } = options;
        const wasOpen = appShell.classList.contains("is-sidebar-open");

        appShell.classList.toggle("is-sidebar-open", isOpen);
        appShell.classList.toggle("is-sidebar-collapsed", !isOpen);
        sidebarToggle.setAttribute("aria-expanded", String(isOpen));
        sidebarBackdrop.hidden = !shellMobileQuery.matches || !isOpen;

        if (animate && wasOpen !== isOpen) {
            setSidebarMotionState(isOpen ? "opening" : "closing");
        }

        if (persist) {
            try {
                window.sessionStorage.setItem("cachelikes:settings-sidebar-open", String(isOpen));
            } catch (_error) {
            }
        }
    }

    try {
        const storedSidebarState = window.sessionStorage.getItem("cachelikes:settings-sidebar-open");
        if (storedSidebarState === "false") {
            setSidebarOpen(false, { persist: false });
        }
    } catch (_error) {
    }

    sidebarToggle.addEventListener("click", () => {
        setSidebarOpen(!appShell.classList.contains("is-sidebar-open"), { animate: true });
    });

    sidebarBackdrop.addEventListener("click", () => {
        setSidebarOpen(false);
    });

    shellMobileQuery.addEventListener("change", () => {
        setSidebarOpen(appShell.classList.contains("is-sidebar-open"), { persist: false });
    });
</script>
</body>
</html>
